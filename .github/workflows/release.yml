name: Multi-Platform Build & Release Pipeline

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v1.0)"
        required: true
        default: "v1.0"
      prerelease:
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.version || github.ref_name }}
  cancel-in-progress: true

# ==============================================================================
jobs:
  # ==============================================================================
  # JOB 1: RESOLVE TAG
  # ==============================================================================
  context:
    name: Resolve Release Context
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.ctx.outputs.tag }}
      prerelease: ${{ steps.ctx.outputs.prerelease }}
    steps:
      - name: Resolve tag and prerelease flag
        id: ctx
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.version }}"
            PRERELEASE="${{ github.event.inputs.prerelease }}"
          else
            TAG="${{ github.ref_name }}"
            PRERELEASE="false"
          fi

          if [ -z "$TAG" ]; then
            echo "ERROR: resolved tag is empty" >&2
            exit 1
          fi

          echo "Resolved tag: $TAG"
          echo "Prerelease  : $PRERELEASE"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

  # ==============================================================================
  # JOB 2: BUILD
  # ==============================================================================
  build-assets:
    name: Build All Targets
    needs: [context]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - linux
          - macos
          - windows
          - android
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true

      - name: Verify Go installation
        shell: bash
        run: |
          set -euo pipefail
          go version

      - name: Make build scripts executable
        shell: bash
        run: chmod +x ./scripts/*.sh

      - name: Run build
        shell: bash
        run: mkdir -p ./dist && ./scripts/release.sh "${{ matrix.target }}" all .

      - name: Verify dist output exists
        shell: bash
        run: |
          ls dist/ && set -euo pipefail
          if [ -z "$(ls -A dist/ 2>/dev/null)" ]; then
            echo "ERROR: dist/ is empty after build for target '${{ matrix.target }}'" >&2
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: bgscan-${{ matrix.target }}
          path: dist/
          retention-days: 1
          if-no-files-found: error

  # ==============================================================================
  # JOB 3: RELEASE PACKAGE
  # ==============================================================================
  publish-release:
    name: Publish GitHub Release
    needs: [context, build-assets]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/
          merge-multiple: true

      - name: Verify downloaded artifacts
        shell: bash
        run: |
          set -euo pipefail
          ls -la dist/
          if [ -z "$(ls -A dist/ 2>/dev/null)" ]; then
            echo "ERROR: no artifacts found in dist/ after download" >&2
            exit 1
          fi
          chmod +x ./scripts/*.sh

      - name: Generate release metadata
        shell: bash
        run: ./scripts/publish.sh "${{ needs.context.outputs.tag }}"

      - name: Verify release metadata files
        shell: bash
        run: |
          set -euo pipefail
          [ -f release/checksum.txt ] || { echo "ERROR: release/checksum.txt not found" >&2; exit 1; }
          [ -f release/release_notes.md ] || { echo "ERROR: release/release_notes.md not found" >&2; exit 1; }

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.context.outputs.tag }}
          name: "bgscan ${{ needs.context.outputs.tag }}"
          prerelease: ${{ needs.context.outputs.prerelease }}
          files: |
            dist/*
            release/checksum.txt
          body_path: release/release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
